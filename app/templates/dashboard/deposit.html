<!DOCTYPE html>
<html>

<head>

    <title>Deposit Money</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        Deposit Money
                    </h3>

                    <form method="post" action="/deposit">

                        <div class="mb-3">

                            <label>
                                Account ID
                            </label>

                            <input
                                type="text"
                                name="account_id"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label>
                                Amount
                            </label>

                            <input
                                type="number"
                                name="amount"
                                class="form-control"
                                required
                            >

                        </div>

                        <button
                            class="btn btn-success w-100"
                        >
                            Deposit
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
