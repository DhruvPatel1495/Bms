<form method="post" action="/login">

    <div class="mb-3">

        <label>
            Account ID
        </label>

        <input
            type="text"
            name="account_id"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label>
            Password
        </label>

        <input
            type="password"
            name="password"
            class="form-control"
            required
        >

    </div>

    <button
        class="btn btn-primary w-100"
    >
        Login
    </button>

</form>
